<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — ERMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0F1D3D,#1B2B5A,#0D7377);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px; }
    .reg-container { width:100%;max-width:700px; }
    .reg-header { text-align:center;margin-bottom:40px; }
    .reg-header h1 { font-size:32px;font-weight:800;color:white;margin-bottom:8px; }
    .reg-header p { color:rgba(255,255,255,.6);font-size:16px; }
    .role-grid { display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px; }
    .role-option { background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:32px 20px;text-align:center;text-decoration:none;color:white;transition:all .3s;backdrop-filter:blur(10px); }
    .role-option:hover { background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:translateY(-4px);color:white; }
    .role-option.featured { border-color:rgba(13,115,119,.6);background:rgba(13,115,119,.15); }
    .role-emoji { font-size:40px;margin-bottom:16px; }
    .role-option h4 { font-size:18px;font-weight:700;margin:0 0 8px; }
    .role-option p { font-size:13px;color:rgba(255,255,255,.55);margin:0; }
    .login-prompt { text-align:center;margin-top:28px;color:rgba(255,255,255,.6);font-size:14px; }
    .login-prompt a { color:#14A8AD;font-weight:600;text-decoration:none; }
  </style>
</head>
<body>
<div class="reg-container">
  <div class="reg-header">
    <div style="font-size:48px;margin-bottom:16px;">🎓</div>
    <h1>Create Your Account</h1>
    <p>Select your role to begin registration</p>
  </div>
  <div class="role-grid">
    <a href="{% url 'accounts:register_student' %}" class="role-option featured">
      <div class="role-emoji">🎓</div><h4>Student</h4>
      <p>View results, track GPA, download transcripts</p>
    </a>
    <a href="{% url 'accounts:register_lecturer' %}" class="role-option">
      <div class="role-emoji">👨‍🏫</div><h4>Lecturer</h4>
      <p>Enter scores, upload results, view statistics</p>
    </a>
    <a href="{% url 'accounts:register_parent' %}" class="role-option">
      <div class="role-emoji">👨‍👩‍👧</div><h4>Parent/Guardian</h4>
      <p>Monitor ward performance and receive notifications</p>
    </a>
  </div>
  <p class="login-prompt">Already have an account? <a href="{% url 'accounts:login' %}">Sign in here</a></p>
</div>
</body>
</html>
